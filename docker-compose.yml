version: '3.8'

services:
  php:
    build: 
      context: ./php-docker
    container_name: php-fpm
    volumes:
      - ./php-docker/AppVendor/auto-part-shop
    networks:
      - mynetwork
    depends_on:
      - db
    ports:
      - "9000:9000"
    environment:
      - PHP_DISPLAY_ERRORS=on
      - PHP_MEMORY_LIMIT=512M

  nginx:
      build:
        context: ./nginx-docker
      container_name: nginx
      ports:
      - "80:80"
      volumes:
      - ./nginx-docker/default.conf:/etc/nginx/conf.d/default.conf
      networks:
      - mynetwork
      depends_on:
      - php
    
  db:
      build:
        context: ./postgres-docker
      container_name: my-postgres-container
      environment:
        POSTGRES_USER: myuser
        POSTGRES_PASSWORD: mypass
        POSTGRES_DB: auto-part-shop
      ports:
      - "5432:5432"
      volumes:
        ./postgres-docker/postgresql.conf:/etc/postgresql/16/main/postgresql.conf
        ./postgres-docker/pg_hba.conf:/etc/postgresql/16/main/pg_hba.conf

networks:
  mynetwork:
    driver: bridge

volumes:
  pgdata: