version: '3.8'

services:
  php:
    build:
      context: ./docker_php
    container_name: php-fpm
    restart: unless-stopped
    volumes:
      - ./auto-parts-shop:/var/www/html  # Монтируем директорию с приложением
    networks:
      - mynetwork
    depends_on:
      - haproxy
    ports:
      - "9000:9000"
    environment:
      - PHP_DISPLAY_ERRORS=on
      - PHP_MEMORY_LIMIT=512M

  nginx:
    build:
      context: ./docker_nginx
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker_nginx/default.conf:/etc/nginx/conf.d/default.conf  # Конфигурация nginx
    networks:
      - mynetwork
    depends_on:
      - php

  # db:
  #   build:
  #     context: ./docker_postgresql
  #   container_name: my-postgres-container
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: ${DB_USER:-myuser}         # 5. Прячем пароли в файл .env
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-mypass}
  #     POSTGRES_DB: ${DB_NAME:-auto_part_shop}
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - ./docker_postgresql/init:/docker-entrypoint-initdb.d
  #     - pgdata:/var/lib/postgresql/data  # Монтируем volume для хранения данных
  #     - ./AppVendor/postgres-docker/postgresql.conf:/etc/postgresql/postgresql.conf.sample  # Конфигурация PostgreSQL
  #     - ./AppVendor/postgres-docker/pg_hba.conf:/etc/postgresql/pg_hba.conf  # Конфигурация безопасности PostgreSQL
  #   networks:
  #     - mynetwork
  #   healthcheck:                 # 7. Проверка "здоровья" базы данных
  #     test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-myuser} -d ${DB_NAME:-auto_part_shop}"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5  
  etcd:
    image: quay.io/coreos/etcd:v3.5.11
    container_name: etcd
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
    networks:
      - mynetwork

  pg-node1:
    image: ghcr.io/zalando/spilo-16:3.3-p3
    container_name: pg-node1
    environment:
      - SCOPE=pg-cluster
      - PATRONI_ETCD3_HOSTS=etcd:2379
      - PATRONI_SCOPE=pg-cluster
      - PATRONI_NAME=pg-node1
      # Критически важные переменные для репликации
      - PATRONI_REPLICATION_USERNAME=standby
      - PATRONI_REPLICATION_PASSWORD=strong_repl_pass
      - PATRONI_SUPERUSER_USERNAME=postgres
      - PATRONI_SUPERUSER_PASSWORD=postgres_super_pass
      - PATRONI_APPLICATION_USER=myuser
      - PATRONI_APPLICATION_PASSWORD=mypass
      - PATRONI_APPLICATION_DATABASE=auto_part_shop
      # Настройки
      - PATRONI_POSTGRESQL_LISTEN=0.0.0.0:5432
      - PATRONI_POSTGRESQL_CONNECT_ADDRESS=pg-node1:5432
      # Bootstrap кластера (только на первом узле)
      - PATRONI_BOOTSTRAP_METHOD=initdb
      - PATRONI_BOOTSTRAP_INITDB=wal-segsize=64MB,wal-keep-size=2048MB,max-connections=100
    volumes:
      - pg_node1_data:/home/postgres/pgdata
    networks:
      - mynetwork
    depends_on:
      - etcd
    command:
      - "bash"
      - "-c"
      - |
        if [ ! -f /home/postgres/pgdata/PG_VERSION ]; then
          patroni /etc/patroni.yml
        else
          patroni /etc/patroni.yml
        fi

  pg-node2:
    image: ghcr.io/zalando/spilo-16:3.3-p3
    container_name: pg-node2
    environment:
      - SCOPE=pg-cluster
      - PATRONI_ETCD3_HOSTS=etcd:2379
      - PATRONI_SCOPE=pg-cluster
      - PATRONI_NAME=pg-node2
      - PATRONI_REPLICATION_USERNAME=standby
      - PATRONI_REPLICATION_PASSWORD=strong_repl_pass
      - PATRONI_SUPERUSER_USERNAME=postgres
      - PATRONI_SUPERUSER_PASSWORD=postgres_super_pass
      - PATRONI_APPLICATION_USER=myuser
      - PATRONI_APPLICATION_PASSWORD=mypass
      - PATRONI_APPLICATION_DATABASE=auto_part_shop
      - PATRONI_POSTGRESQL_LISTEN=0.0.0.0:5432
      - PATRONI_POSTGRESQL_CONNECT_ADDRESS=pg-node2:5432
      # Ключевые настройки для реплики
      - PATRONI_BOOTSTRAP_METHOD=replica
      - PATRONI_REPLICA_METHOD=wal_e
      # Ждем появления мастера
      - PATRONI_WAIT_MASTER_BOOTSTRAP=true
    volumes:
      - pg_node2_data:/home/postgres/pgdata
    networks:
      - mynetwork
    depends_on:
      - etcd
      - pg-node1

  haproxy:
    image: haproxy:latest
    container_name: haproxy
    ports:
      - "5432:5432" # Открываем стандартный порт Postgres наружу для PHP
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - mynetwork
    depends_on:
      - pg-node1
      - pg-node2          

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus # Сохраняем метрики при перезапусках
    ports:
      - "9090:9090"
    restart: unless-stopped
    depends_on:
      - node-exporter

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana # Сохраняем твои дашборды
    restart: unless-stopped
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped

networks:
  mynetwork:
    driver: bridge

volumes:
  pgdata:  # Определяем volume для хранения данных PostgreSQL
  prometheus_data:
  grafana_data:
  pg_node1_data:
  pg_node2_data:
