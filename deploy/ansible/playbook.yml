---
- name: Деплой магазина автозапчастей на основе Docker Compose через Git
  hosts: webservers
  become: yes
  vars:
    project_dir: "/home/dyuzov/var/www/AppVendor"
    repo_url: "https://github.com/MindFure/AppVendor"
    repo_branch: "main"

  tasks:
    # =================================================================
    # ШАГ 0: Подготовка (Ждем, пока ОС закончит фоновые обновления)
    # =================================================================
    - name: Ожидание освобождения менеджера пакетов (apt lock)
      ansible.builtin.shell: "while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do sleep 5; done;"
      changed_when: false
    # =================================================================
    # ШАГ 1: Установка и обновление Docker
    # =================================================================
    - name: Установка системных зависимостей
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - git
        state: present
        update_cache: yes

    - name: Создание директории для ключей APT
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Удаление старых конфликтующих ключей и старых записей репозиториев
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/keyrings/docker.gpg
        - /etc/apt/sources.list.d/download_docker_com_linux_ubuntu.list

    - name: Добавление актуального GPG-ключа Docker
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'
        force: yes

    - name: Получение архитектуры системы
      command: dpkg --print-architecture
      register: dpkg_arch
      changed_when: false

    - name: Получение кодового имени релиза
      command: lsb_release -cs
      register: lsb_release
      changed_when: false

    - name: Добавление репозитория Docker (используя docker.asc)
      apt_repository:
        repo: "deb [arch={{ dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ lsb_release.stdout }} stable"
        state: present
        filename: docker

    - name: Установка Docker и Docker Compose плагина
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Проверка запуска службы Docker
      service:
        name: docker
        state: started
        enabled: yes

    # =================================================================
    # ШАГ 2: Клонирование репозитория напрямую на целевой сервер
    # =================================================================
    - name: Клонирование или обновление репозитория проекта
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ project_root }}"
        version: "{{ repo_branch }}"
        force: yes
      register: git_result

    # =================================================================
    # ШАГ 3: Умная сборка и деплой без даунтайма БД
    # =================================================================
    - name: Умное обновление контейнеров (пересборка только изменившегося кода)
      command: docker compose up -d --build
      args:
        chdir: "{{ project_root }}"
      register: compose_output

    - name: Очистка старых неиспользуемых образов
      command: docker image prune -f
      changed_when: false

    - name: Небольшая пауза для стабилизации сети (5 секунд)
      pause:
        seconds: 5

    # =================================================================
    # ШАГ 4: Контроль здоровья отказоустойчивого кластера
    # =================================================================
    - name: Ожидание полной инициализации кластера Patroni (до 2 минут)
      command: docker exec pg-node1 patronictl list
      register: patroni_status
      until: "'Replica' in patroni_status.stdout and 'running' in patroni_status.stdout"
      retries: 12      # Делаем 12 попыток...
      delay: 10        # ...каждые 10 секунд
      changed_when: false

    - name: Определение текущего лидера кластера
      shell: "docker exec pg-node1 patronictl list --format json"
      register: patroni_list
      changed_when: false

    - name: Извлечение имени лидера
      set_fact:
        current_leader: "{{ (patroni_list.stdout | from_json | selectattr('Role', 'equalto', 'Leader') | map(attribute='Member') | first) }}"

    - name: Вывод текущего лидера для отладки
      debug:
        msg: "Текущий лидер кластера: {{ current_leader }}"

    - name: Проверка наличия базы данных auto_part_shop
      command: "docker exec {{ current_leader }} psql -U postgres -tAc \"SELECT 1 FROM pg_database WHERE datname='auto_part_shop'\""
      register: db_exists
      changed_when: false

    - name: Инициализация пользователя и базы данных
      command: "docker exec {{ current_leader }} psql -U postgres -f /docker-entrypoint-initdb.d/01_init.sql"
      when: db_exists.stdout != "1"

    - name: Накат структуры и данных в базу
      command: "docker exec {{ current_leader }} psql -U postgres -d auto_part_shop -f /docker-entrypoint-initdb.d/02_dump.sql"
      when: db_exists.stdout != "1"
      
    - name: Вывод финальной таблицы кластера в консоль Jenkins
      debug:
        msg: "{{ patroni_status.stdout_lines }}"

    - name: Автоматическая проверка — завелась ли Реплика?
      fail:
        msg: "ВНИМАНИЕ: Реплика (pg-node2) не смогла подключиться к Лидеру или кластер изолирован!"
      when: "'Replica' not in patroni_status.stdout or 'running' not in patroni_status.stdout"
    # =================================================================
    # ШАГ 5: Автоматизация бэкапов через Cron
    # =================================================================
    - name: Убеждаемся, что директория для бэкапов существует
      ansible.builtin.file:
        path: "{{ project_root }}/backups"
        state: directory
        owner: "{{ ansible_user_id }}"
        mode: '0755'

    - name: Добавление регулярного бэкапа базы данных в crontab
      ansible.builtin.cron:
        name: "AppVendor PostgreSQL Backup" # Уникальное имя, по нему Ansible находит таску
        minute: "0"
        hour: "3"
        user: "{{ ansible_user_id }}"
        job: "/usr/bin/python3 {{ project_root }}/scripts/backup.py >> {{ project_root }}/backups/cron.log 2>&1"  
    # =================================================================
    # ШАГ 6: Автоматический мониторинг аптайма и сети (Watchdog)
    # =================================================================
    - name: Гарантировать наличие папок для скриптов и логов мониторинга
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
        owner: "{{ ansible_user_id }}"
        group: "{{ ansible_user_id }}"
      loop:
        - "{{ project_root }}/scripts"
        - "{{ project_root }}/logs"

    - name: Копировать скрипт мониторинга сети из шаблона
      ansible.builtin.template:
        src: network_watchdog.py.j2
        dest: "{{ project_root }}/scripts/network_watchdog.py"
        mode: '0755'
        owner: "{{ ansible_user_id }}"
        group: "{{ ansible_user_id }}"

    - name: Добавить запись в Cron для логирования ребутов сервера
      ansible.builtin.cron:
        name: "AppVendor Watchdog Boot Log"
        special_time: reboot
        user: "{{ ansible_user_id }}"
        job: "/usr/bin/python3 {{ project_root }}/scripts/network_watchdog.py boot"

    - name: Добавить запись в Cron для ежеминутной проверки интернета
      ansible.builtin.cron:
        name: "AppVendor Watchdog Internet Check"
        minute: "*"
        user: "{{ ansible_user_id }}"
        job: "/usr/bin/python3 {{ project_root }}/scripts/network_watchdog.py"    