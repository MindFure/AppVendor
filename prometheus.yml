global:
  scrape_interval: 15s # Как часто собирать метрики

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter' # Наш датчик сервера
    static_configs:
      - targets: ['node-exporter:9100']

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Метрики балансировщика HAProxy
  - job_name: 'haproxy'
    static_configs:
      - targets: ['haproxy:7000'] 

  # Метрики Patroni-кластера (обе ноды базы данных)
  - job_name: 'patroni'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['pg-node1:8008', 'pg-node2:8008']