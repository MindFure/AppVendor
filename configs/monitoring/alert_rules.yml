groups:
  - name: 'infrastructure_alerts'
    rules:
      - alert: 'InstanceDown'
        expr: up == 0
        for: 1m
        labels:
          severity: 'critical'
        annotations:
          summary: "🚨 Сервис {{ $labels.instance }} недоступен!"
          description: "Прометеус не может получить метрики от {{ $labels.instance }} (задача: {{ $labels.job }}) уже больше минуты. Проверьте статус контейнера."